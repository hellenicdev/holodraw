<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HoloDraw — Real-Time Whiteboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✏️</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Auth Modal -->
  <div id="auth-modal" class="modal-overlay hidden">
    <div class="modal glass">
      <div class="modal-header">
        <h2 id="auth-title">Welcome to HoloDraw</h2>
        <p class="modal-subtitle">Real-time collaborative whiteboard</p>
      </div>
      <div class="modal-body">
        <form id="auth-form">
          <div id="username-field" class="form-group hidden">
            <label for="username-input">Username</label>
            <input type="text" id="username-input" placeholder="Choose a username" minlength="3" maxlength="30">
          </div>
          <div class="form-group">
            <label for="email-input">Email</label>
            <input type="email" id="email-input" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label for="password-input">Password</label>
            <input type="password" id="password-input" placeholder="Enter password" minlength="6" required>
          </div>
          <p id="auth-error" class="auth-error hidden"></p>
          <button type="submit" class="btn btn-primary" id="auth-submit">Sign In</button>
        </form>
        <p class="auth-switch">
          <span id="auth-switch-text">Don't have an account?</span>
          <button id="auth-toggle" class="link-btn">Sign Up</button>
        </p>
        <button id="guest-btn" class="btn btn-secondary">Continue as Guest</button>
      </div>
    </div>
  </div>

  <!-- Join/Create Room Modal -->
  <div id="room-modal" class="modal-overlay hidden">
    <div class="modal glass">
      <div class="modal-header">
        <h2>Join or Create Board</h2>
      </div>
      <div class="modal-body">
        <form id="create-room-form">
          <div class="form-group">
            <label for="board-name-input">Board Name</label>
            <input type="text" id="board-name-input" placeholder="My Awesome Board" value="Untitled Board">
          </div>
          <button type="submit" class="btn btn-primary">Create New Board</button>
        </form>
        <div class="divider"><span>or</span></div>
        <form id="join-room-form">
          <div class="form-group">
            <label for="room-id-input">Room Code</label>
            <input type="text" id="room-id-input" placeholder="e.g. ABC123" maxlength="10" style="text-transform: uppercase; letter-spacing: 2px;">
          </div>
          <button type="submit" class="btn btn-secondary">Join Board</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden">
    <!-- Top Navigation Bar -->
    <header id="topbar">
      <div class="topbar-left">
        <h1 class="logo">Holo<span class="accent">Draw</span></h1>
        <div class="room-info">
          <span class="room-label">Room:</span>
          <span id="room-id-display" class="room-id">---</span>
          <button id="copy-room-btn" class="icon-btn" title="Copy Room ID">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
      </div>
      <div class="topbar-center">
        <button id="undo-btn" class="icon-btn" title="Undo (Ctrl+Z)" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
        </button>
        <button id="redo-btn" class="icon-btn" title="Redo (Ctrl+Y)" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
        </button>
        <div class="divider-v"></div>
        <button id="clear-board-btn" class="icon-btn danger" title="Clear Board">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
        <div class="divider-v"></div>
        <button id="export-png-btn" class="icon-btn" title="Export as PNG">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
      </div>
      <div class="topbar-right">
        <button id="share-board-btn" class="btn btn-sm btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Share
        </button>
        <div class="user-avatar" id="user-menu-btn">
          <span id="user-avatar-text">G</span>
          <div id="user-dropdown" class="dropdown hidden">
            <p class="dropdown-user"><strong id="dropdown-username">Guest</strong></p>
            <hr>
            <button id="logout-btn" class="dropdown-item">Sign Out</button>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <div id="main-content">
      <!-- Left Toolbar -->
      <aside id="toolbar">
        <div class="tool-group">
          <button class="tool-btn active" data-tool="pencil" title="Pencil (P)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
          </button>
          <button class="tool-btn" data-tool="rectangle" title="Rectangle (R)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          </button>
          <button class="tool-btn" data-tool="circle" title="Circle (C)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
          </button>
          <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M11 3 21 13"/><path d="M3 13h18"/></svg>
          </button>
        </div>
        <div class="divider-h"></div>
        <div class="tool-group">
          <button class="tool-btn" data-tool="pan" title="Pan (Space)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8V5a2 2 0 0 1 2-2h2"/><path d="M19 8V5a2 2 0 0 0-2-2h-2"/><path d="M5 16v3a2 2 0 0 0 2 2h2"/><path d="M19 16v3a2 2 0 0 1-2 2h-2"/><polyline points="8 12 12 8 16 12"/><line x1="12" y1="8" x2="12" y2="16"/></svg>
          </button>
          <button class="tool-btn" data-tool="sticky" title="Sticky Note (S)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v6h6"/></svg>
          </button>
          <button class="tool-btn" data-tool="select" title="Select (V)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/></svg>
          </button>
        </div>
        <div class="divider-h"></div>
        <div class="tool-group">
          <div class="tool-setting">
            <label class="setting-label">Color</label>
            <input type="color" id="color-picker" value="#6366f1">
          </div>
          <div class="tool-setting">
            <label class="setting-label">Size</label>
            <div class="size-control">
              <input type="range" id="stroke-width" min="1" max="20" value="3">
              <span id="stroke-width-label">3</span>
            </div>
          </div>
        </div>
      </aside>

      <!-- Canvas -->
      <main id="canvas-container">
        <canvas id="whiteboard"></canvas>
        <!-- Cursors layer -->
        <div id="cursors-layer"></div>

        <!-- Zoom controls -->
        <div id="zoom-controls">
          <button id="zoom-in-btn" class="icon-btn-sm" title="Zoom In">+</button>
          <span id="zoom-level">100%</span>
          <button id="zoom-out-btn" class="icon-btn-sm" title="Zoom Out">−</button>
          <button id="zoom-reset-btn" class="icon-btn-sm" title="Reset Zoom">⟲</button>
        </div>

        <!-- Sticky notes container -->
        <div id="sticky-notes-container"></div>
      </main>

      <!-- Right Sidebar -->
      <aside id="sidebar" class="collapsed">
        <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle Sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>

        <div class="sidebar-content">
          <!-- Users panel -->
          <section class="sidebar-panel" id="users-panel">
            <h3 class="panel-title">Online <span id="user-count">0</span></h3>
            <ul id="user-list"></ul>
          </section>

          <!-- Layers panel -->
          <section class="sidebar-panel" id="layers-panel">
            <h3 class="panel-title">Layers</h3>
            <ul id="layers-list"></ul>
            <button id="add-layer-btn" class="btn btn-sm btn-secondary" style="width:100%;margin-top:8px;">+ Add Layer</button>
          </section>

          <!-- Actions panel -->
          <section class="sidebar-panel" id="actions-panel">
            <h3 class="panel-title">Actions</h3>
            <button id="export-pdf-btn" class="btn btn-sm btn-secondary action-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export PDF
            </button>
            <button id="export-svg-btn" class="btn btn-sm btn-secondary action-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
              Export SVG
            </button>
          </section>
        </div>
      </aside>
    </div>

    <!-- Mini Minimap -->
    <div id="minimap" class="collapsed">
      <canvas id="minimap-canvas"></canvas>
    </div>
    <button id="minimap-toggle" title="Toggle Minimap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    </button>

    <!-- Share Modal -->
    <div id="share-modal" class="modal-overlay hidden">
      <div class="modal glass modal-sm">
        <div class="modal-header">
          <h2>Share Board</h2>
          <button class="modal-close icon-btn" id="share-modal-close">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <p>Share this room code with collaborators:</p>
          <div class="share-code">
            <span id="share-room-id">---</span>
            <button id="share-copy-btn" class="btn btn-sm btn-primary">Copy</button>
          </div>
          <p class="share-link-desc">Or share this direct link:</p>
          <div class="share-link-row">
            <input type="text" id="share-link-input" readonly>
            <button id="share-link-copy-btn" class="btn btn-sm btn-primary">Copy</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
