services:
  - type: web
    name: holodraw
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        value: mongodb+srv://user:password@cluster.mongodb.net/holodraw?retryWrites=true
        # ⚠️ Replace with your actual MongoDB Atlas connection string
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://hellenicdev.github.io/holodraw
